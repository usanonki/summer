<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>백합</title>

    <!-- Google Fonts Preload + Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Nanum Brush Script -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 원본 이미지의 비율 유지 고정 박스 */
      .card-stage {
        position: relative;
        width: 100vw;
        height: 58vw; /* 16:9 비율 유지 */
        max-width: 100%;
        max-height: 100%;
        background: url('https://usanonki.github.io/photo/bh.jpg') no-repeat center center;
        background-size: cover;
      }

      /* mp4 효과 레이어 */
      .effect-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .effect-layer video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.75;
        mix-blend-mode: screen;
        filter: brightness(1.3);
      }

      /* 타이틀 제목 */
      h1 {
        position: absolute;
        top: 6%;
        left: 10%;
        transform: translateX(-50%);
        font-family: 'Nanum Brush Script', cursive;
        font-size: 8vmin;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(90deg, #eedc40, #f8f8f7, #ee6b1f, #e60e4f);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        color: transparent;
        animation:
          fadeIn 2.2s ease-out forwards,
          shine 6s ease-in-out infinite,
          glow 4s ease-in-out infinite;
        pointer-events: none;
        white-space: nowrap;
        z-index: 10;
      }

      /* 인사말 본문 컨테이너 */
      .greeting-container {
        position: absolute;
        top: 25%;             
        left: 7%;             
        font-family: 'Nanum Brush Script', cursive;
        font-size: 5.5vmin;    
        line-height: 1.3;     
        color: #f3a64e;       
        text-shadow: 2px 2px 4px rgba(10, 50, 10, 0.85),
                     0px 0px 10px rgba(0, 0, 0, 0.4); 
        z-index: 11;
        animation: fadeIn 3s ease-out forwards; 
      }

      .greeting-p {
        margin-bottom: 3vmin;  
      }

      /* 서명(마에스트라) 스타일: 마진을 없애서 아래 플레이어와 밀착 유도 */
      .signature {
        margin-bottom: 0.5vmin;
        /* 추가할 스타일 */
        color: #d4b010;          /* 원하는 색상으로 변경 */
        font-size: 4.5vmin;      /* greeting-container(5.5vmin)보다 작게 */
        line-height: 1.1;        /* 기본값(1.3)보다 줄여서 줄 간격 좁힘 */
      }

      @keyframes fadeIn {
        0% { opacity: 0.35; transform: translateY(5px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes shine {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes glow {
        0%   { filter: brightness(1) drop-shadow(0 0 6px rgba(255, 235, 100, 0.4)); }
        50%  { filter: brightness(1.2) drop-shadow(0 0 18px rgba(255, 220, 50, 0.85)); }
        100% { filter: brightness(1) drop-shadow(0 0 6px rgba(255, 235, 100, 0.4)); }
      }

      /* 🌟 오디오 플레이어와 마에스트라 간격 조절 */
      .audio-inline {
        margin-top: -0.5vmin; /* 마이너스 마진을 주어 위로 바짝 붙였습니다 */
      }

      .audio-inline audio {
        border: 2px solid #d4d09b;
        border-radius: 25px;
        width: 38vmin;       
        height: 20px;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="card-stage">
      
      <!-- 타이틀 제목 -->
      <h1>백 합</h1>

      <!-- 인사말 본문 -->
      <div class="greeting-container">
        <div class="greeting-p">
          흰색 백합: 순결, 깨끗함, 변치 않는 사랑, 숭고한 희생을 상징<br>
          노란색 백합: 기쁨과 행복, 긍정적인 태도, 희망과 행운을 의미
        </div>
        <div class="greeting-p">
          분홍색 백합: 사랑과 애정, 감탄과 감사의 마음을 나타내며<br>
          주황색 백합: 열정과 용기, 인간 정신의 담대함을 상징
        </div>
        <div class="greeting-p">
          백합은 단순히 아름다운 꽃을 넘어<br>
          순결, 변치 않는 사랑, 기쁨, 사랑, 열정 등 다양한 의미를 담고 있습니다.<br>
        </div>
        
        <!-- 🌟 마에스트라 부분을 별도 class로 분리하고 <br> 태그를 제거했습니다 -->
        <div class="signature">
          장한별 - 그대 내 친구여<br>
          마에스트라
        </div>

        <!-- 오디오 플레이어 -->
        <div class="audio-inline">
          <audio id="mainAudio" 
            src="https://64.media.tumblr.com/c8136fe3dc7184b48a501163dbf2277d/06b070899a0b4010-9a/f297fa623c997001f22a378be3c0a8a2928edbaa.mp3"
            controls autoplay loop>
          </audio>
        </div>
      </div>

      <!-- mp4 효과 레이어 -->
      <div class="effect-layer">
        <video src="" autoplay loop muted></video>
        <video src="https://github.io" autoplay loop muted></video>
      </div>

    </div>

    <script>
      const audio = document.getElementById('mainAudio');
      audio.volume = 0.4;

      document.body.addEventListener('click', () => audio.play(), {
        once: true,
      });
    </script>
  </body>
</html>
