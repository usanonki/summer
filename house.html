<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 배경 + 중앙 영상 및 오디오</title>
    <link href="https://googleapis.com" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 1. 배경 이미지 및 중앙 정렬 설정 */
      body {
        background-image: url('https://usanonki.github.io/photo/house.jpg'); /* 배경 이미지 */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        overflow: hidden;
        background-color: #000;
        
        /* 영상과 오디오를 화면 중앙에 배치하기 위한 Flexbox 설정 */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 2. 미디어(영상 + 오디오) 그룹 컨테이너 */
      .media-center {
        display: flex;
        flex-direction: column; /* 세로로 배치 */
        align-items: center;
        gap: 10px; /* 영상과 오디오 사이의 간격 */
        z-index: 10;
      }

      /* 3. 영상 컨테이너 스타일 */
      .video-container {
        width: 400px; /* 보기 좋게 크기를 약간 키웠습니다 (원하는 크기로 수정 가능) */
        aspect-ratio: 16 / 9; /* 16:9 비율 유지 */
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }

      .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* 4. 오디오 플레이어 스타일 */
      .audio-container audio {
        border: 2.5px solid #4b4e47;
        border-radius: 40px;
        width: 250px;
        height: 25px; /* 컨트롤이 잘 보이도록 기존 25px에서 35px로 약간 늘렸습니다 */
        outline: none;
      }

      /* 5. 우측 하단 텍스트 (기존 유지) */
      .overlay-text {
        position: fixed;
        right: 5%;
        bottom: 6%;
        z-index: 9999;
        text-align: center;
      }

      .overlay-text p {
        font-family: 'Nanum Brush Script', cursive, sans-serif;
        font-size: 1.8em;
        color: #221fe0;
        text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
        margin: 0;
      }
    </style>
  </head>

  <body>
    
    <!-- 화면 중앙에 배치될 영상 및 오디오 그룹 -->
    <div class="media-center">
      
      <!-- 영상 영역 -->
      <div class="video-container">
        <video autoplay muted loop playsinline>
          <source
            src="https://usanonki.github.io/photo/house.mp4"
            type="video/mp4"
          />
        </video>
      </div>

      <!-- 오디오 플레이어 -->
      <div class="audio-container">
        <audio
          src="https://64.media.tumblr.com/3682ef729a296cebc3c0404ae5508bb3/27b93379e00f6b26-5b/dc9a6ce5b5ccb278cbecaa815d5313d69305b8e7.mp3"
          controls
          autoplay
          loop
        >
          
        </audio>
      </div>
      
    </div>

    <!-- 우측 하단 텍스트 -->
    <div class="overlay-text">
      <p id="status-text"></p>
    </div>

  </body>
</html>
