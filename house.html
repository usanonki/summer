<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지 배경 + 중앙 영상 및 오디오</title>
    <link href="https://googleapis.com" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 1. 배경 이미지 및 정렬 설정 */
      body {
        background-image: url('https://usanonki.github.io/photo/house.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        overflow: hidden;
        background-color: #000;

        display: flex;
        justify-content: flex-start;
        align-items: flex-end;
        padding-left: 1%;
        padding-bottom: 1%;

        cursor: pointer; /* 클릭 가능한 화면임을 은근히 암시 */
      }

      /* 2. 미디어(영상) 그룹 컨테이너 */
      .media-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 10;
      }

      /* 3. 영상 컨테이너 스타일 */
      .video-container {
        position: relative; /* 오디오를 이 안에서 절대 위치로 배치하기 위한 기준점 */
        width: 400px;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        overflow: hidden; /* 오디오가 영상 밖으로 튀어나가지 않도록 잘라줌 */
        opacity: 0.7; /* 컨테이너 전체(영상+테두리+그림자)가 다 같이 투명해짐 */
      }

      .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* 4. 오디오 플레이어: 영상 하단에 겹쳐지되, 화면엔 보이지 않음 */
      .audio-container {
        display: none; /* 플레이어 UI 완전히 숨김 */
      }

      /* 5. 우측 하단 텍스트 */
      .overlay-text {
        position: fixed;
        right: 5%;
        bottom: 6%;
        z-index: 9999;
        text-align: center;
      }

      .overlay-text p {
        font-family: 'Nanum Brush Script', cursive, sans-serif;
        font-size: 1.8em;
        color: #221fe0;
        text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
        margin: 0;
      }
    </style>
  </head>

  <body>

    <!-- 화면 좌측 하단에 배치될 영상 + (숨겨진) 오디오 -->
    <div class="media-center">
      <div class="video-container">
        <video autoplay muted loop playsinline>
          <source
            src="https://usanonki.github.io/photo/house.mp4"
            type="video/mp4"
          />
        </video>

        <!-- 오디오는 영상 안에 위치하지만 화면엔 보이지 않음 -->
        <div class="audio-container">
          <audio
            id="bgm"
            src="https://64.media.tumblr.com/3682ef729a296cebc3c0404ae5508bb3/27b93379e00f6b26-5b/dc9a6ce5b5ccb278cbecaa815d5313d69305b8e7.mp3"
            loop
          ></audio>
        </div>
      </div>
    </div>

    <!-- 우측 하단 텍스트 -->
    <div class="overlay-text">
      <p id="status-text"></p>
    </div>

    <script>
      // 화면을 처음 클릭하는 순간 배경음악 재생 시작
      document.body.addEventListener(
        'click',
        function startAudio() {
          const audio = document.getElementById('bgm');
          audio.play().catch((err) => {
            console.log('재생 실패:', err);
          });
          document.body.removeEventListener('click', startAudio);
        },
        { once: true }
      );
    </script>

  </body>
</html>
