<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bilitis - Francis Lai</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: #000;
    display: flex; justify-content: center; align-items: center;
  }

  .card-stage {
    position: relative;
    width: 100vw;
    height: 58vw;
    background: url('https://64.media.tumblr.com/b2d3740050f0e294928207613dfbf287/b1edbfa85febfad1-fe/s540x810/414a52c8d60e6a446d085a589f99fd35f0a5b047.jpg') no-repeat center center;
    background-size: cover;
  }

  h1 {
    position: absolute;
    top: 6%; left: 10%;
    transform: translateX(-50%);
    font-family: 'Nanum Brush Script', cursive;
    font-size: 8vmin;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(90deg, #eedc40, #f8f8f7, #ee6b1f, #e60e4f);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    color: transparent;
    animation: fadeIn 2.2s ease-out forwards, shine 6s ease-in-out infinite, glow 4s ease-in-out infinite;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  .greeting-container {
    position: absolute;
    top: 25%; left: 7%;
    font-family: 'Nanum Brush Script', cursive;
    font-size: 5.5vmin;
    line-height: 1.3;
    color: #e4ce0b;
    text-shadow: 2px 2px 4px rgba(10, 50, 10, 0.85),
                 0px 0px 10px rgba(0, 0, 0, 0.4);
    z-index: 11;
  }

  .text-block {
    opacity: 0;
    transition: opacity 2.5s ease-in-out;
  }

  .text-block.show {
    opacity: 1;
  }

  .signature {
    margin-top: 2vmin;
    color: #d4b010;
    font-size: 4.5vmin;
    line-height: 1.1;
  }

  .audio-inline audio {
    border: 2px solid #d4d09b;
    border-radius: 25px;
    width: 38vmin;
    height: 20px;
    display: block;
    margin-top: 1vmin;
  }

  @keyframes fadeIn {
    0% { opacity: 0.35; transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>
<div class="card-stage">

  <h1>Bilitis - Francis Lai</h1>

  <div class="greeting-container">

    <!-- 3단 감성 텍스트 -->
    <div id="t1" class="text-block">
      흐릿한 빛 속에서 시작되는 이야기.<br>
      부드러운 플루트와 얇은 스트링이 스며들 듯 번지며,<br>
      아직 말해지지 않은 감정만이 천천히 떠오릅니다.
    </div>

    <div id="t2" class="text-block">
      청춘의 결이 흔들리는 순간.<br>
      순수함과 성숙 사이의 얇은 경계를 따라 흐르는 선율,<br>
      마음속 깊은 떨림을 조용히 건드립니다.
    </div>

    <div id="t3" class="text-block">
      바람처럼 스쳐 지나가는 기억.<br>
      빛이 스치고 감정이 지나가고,<br>
      여운만이 부드럽게 남습니다.
    </div>

    <div class="signature">
      Maestra JP
    </div>

    <!-- 오디오 플레이어 (정상 작동 버전) -->
    <div class="audio-inline">
      <audio id="mainAudio"
        src="https://blog.kakaocdn.net/dn/HIlj1/btrzuzgtAa7/m1mKkmh6Az1RuR9deHqLf0/tfile.mp3"
        controls autoplay loop>
      </audio>
    </div>

  </div>

</div>

<script>
const audio = document.getElementById('mainAudio');
audio.volume = 0.45;

// 텍스트 DOM
const t1 = document.getElementById('t1');
const t2 = document.getElementById('t2');
const t3 = document.getElementById('t3');

// 음악 길이에 맞춘 타이밍 (원하면 조정 가능)
const timing1 = 0;      // 0초 ~
const timing2 = 14;     // 14초 ~
const timing3 = 32;     // 32초 ~

function updateText() {
  const ct = audio.currentTime;

  if (ct >= timing1 && ct < timing2) {
    t1.classList.add('show');
    t2.classList.remove('show');
    t3.classList.remove('show');
  }
  else if (ct >= timing2 && ct < timing3) {
    t1.classList.remove('show');
    t2.classList.add('show');
    t3.classList.remove('show');
  }
  else if (ct >= timing3) {
    t1.classList.remove('show');
    t2.classList.remove('show');
    t3.classList.add('show');
  }
}

setInterval(updateText, 500);

// 모바일 자동재생 대응
document.body.addEventListener('click', () => audio.play(), { once: true });
</script>

</body>
</html>
