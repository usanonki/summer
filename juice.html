<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background and Iframe Example</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            
            /* 배경 스타일 */
            background-color: #ffffff;
            background-image: 
                    url('https://usanonki.github.io/photo/juice.gif');
            background-attachment: scroll;     /* 작은 iframe에 더 적합 */
            background-repeat: no-repeat;
            background-position: right bottom;
            background-size: 100% 100%, 85% auto;   /* iframe용으로 조정 */
            position: relative;                 /* 텍스트 위치를 위해 추가 */
            overflow: hidden;
        }

        /* ===== 메인 텍스트 ===== */
        .overlay-text {
            position: absolute;
            left: 6%;
            top: 25%;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 
                0 0 15px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(0, 0, 0, 0.7),
                3px 3px 0 rgba(0, 0, 0, 0.5);
            z-index: 10;
            max-width: 55%;
            pointer-events: none;
        }

        /* 모바일/작은 iframe 대응 */
        @media (max-width: 600px) {
            .overlay-text {
                font-size: 1.8rem;
                left: 10%;
                top: 20%;
                max-width: 75%;
            }
        }

        audio {
            width: 60%;
            max-width: 200px;
            height: 22px;
            right: 15px;
            bottom: 35px;
            position: fixed;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            border: 1.5px solid #8ac0e4;
            z-index: 20;
        }
    </style>
</head>
<body>
    <!-- 오버레이 텍스트 -->
    <div class="overlay-text">
        무더운 여름,<br>
        상큼한 쥬스 한잔으로<br>
        더위 탈출~~~ 🌿<br><br>
        모루님은 팥넣은 차가운 하드말고<br>
        뜨뜻한 탕,국으로 건강회복 ^^
    </div>

    <!-- 오디오  -->
    <audio id="mainAudio" 
         
        src="https://usanonki.github.io/music/bemylover.mp3"controls autoplay loop>
    </audio>

    <script>
        const audio = document.getElementById("mainAudio");
        audio.volume = 0.45; // 0.0 ~ 1.0 사이 값, 0.45 = 45%
    </script>

</body>
</html>
