<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>움짤모음</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 기본 초기화 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 배경 영상 */
      #bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      /* 전체 스타일 */
      body {
        height: 100vh;
        overflow: hidden;

        color: white;
        text-align: center;
        font-family: 'Nanum Brush Script', cursive;
        font-size: 30px;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.9);
      }

      /* 콘텐츠 */
      .content {
        margin-top: 10vh;
      }

      h1 {
        font-size: 40px;
        line-height: 1.2;
        margin-bottom: 10px;
      }

      .content p {
        line-height: 1.4;
        margin-bottom: 20px;
      }

      /* 오디오 플레이어 */
      .audio-box {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        max-width: 90%;
      }

      .audio-box audio {
        width: 220px;
        height: 20px;
        max-width: 100%;

        border: 2.5px solid #9dc8f0;
        border-radius: 25px;

        background: rgba(0, 0, 0, 0.3);

        filter: drop-shadow(0 4px 12px rgba(157, 200, 240, 0.4))
          drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6));
      }
    </style>
  </head>

  <body>
    <!-- 배경 영상 -->
    <video autoplay muted loop id="bg-video">
      <source
        src="https://va.media.tumblr.com/tumblr_tfqa9bg6eQ1b09833.mp4"
        type="video/mp4"
      />
    </video>

    <!-- 콘텐츠 -->
    <div class="content">
      <h1>놀라운세상</h1>
      <p>자나 깨나 차 조심.</p>
    </div>

    <!-- 오디오 -->
    <div class="audio-box">
      <audio controls autoplay loop>
        <source
          src="https://64.media.tumblr.com/e2bc8ffef1f0cd1c2e500fbf2ce93856/92d223cb30513579-eb/153f771ae8176923576a7d933d980b46ac0e7efe.mp3"
          type="audio/mpeg"
        />
      </audio>
    </div>
  </body>
</html>
