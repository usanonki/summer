<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morgan Luna - Don’t Let Me Down</title>

    <!-- Google Fonts Preload + Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Nanum Brush Script -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">

    <style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* 첫 번째 이미지 (항상 기본으로 깔림) */
  .scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('https://64.media.tumblr.com/d153a711b3300f999277212fb296f230/bc7dbe70ffb30196-c6/s2048x3072/4a19b995a76b11f8ad7cc4032f1660b5ce8cf01d.pnj');
    background-size: cover;
    background-position: center;
    filter: brightness(0.75) contrast(1.05);
    z-index: 1;
  }

  /* 두 번째 이미지 */
  .scene::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('https://64.media.tumblr.com/1e3bca368443c1da0e5626ff4415797c/bc7dbe70ffb30196-ef/s2048x3072/05e47faecca328378bc772bed3b56671f3260c8b.pnj');
    background-size: cover;
    background-position: center;
    filter: brightness(0.75) contrast(1.05);
    z-index: 2;
    opacity: 0;
    animation: backgroundSwitch 120s infinite linear; /* 120초 주기 = 60초마다 전환 */
  }

  @keyframes backgroundSwitch {
    0%    { opacity: 0; }     /* 첫 번째 이미지 */
    48%   { opacity: 0; }     /* 57.6초까지 첫 번째 이미지 유지 */
    50%   { opacity: 1; }     /* 빠른 Fade In (약 1.2초) */
    98%   { opacity: 1; }     /* 두 번째 이미지 거의 60초 유지 */
    100%  { opacity: 0; }     /* 빠른 Fade Out */
  }

  /* 오버레이 & 오디오 (기존 그대로) */
  .overlay {
    position: absolute;
    bottom: 12%;
    text-align: center;
    color: #f5f5f5;
    font-family: 'Noto Serif KR', serif;
    text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
    z-index: 20;
  }

  .overlay p {
    margin: 0.8em 0;
    opacity: 0;
    letter-spacing: 0.06em;
    transition: opacity 2s ease-out, transform 2s ease-out;
  }

  .overlay p.show {
    opacity: 1;
    transform: translateY(0);
  }

  audio {
    position: absolute;
    bottom: 20px;
    left: 20px;
    opacity: 0.5;
    width: 250px;
    height: 25px;
    border: 2.5px solid #abf09d;
    border-radius: 25px;
    z-index: 10;
  }
</style>
  </head>

  <body>
    <div class="scene">
      <audio
        id="bgm"
        src="https://64.media.tumblr.com/61ab428db57177dc3caa3af3c64bde25/84b77099b25f6136-5f/cd6c1a4c77933628d137045c0eeba47dc4d1c3ef.mp3"
        controls
        autoplay
      ></audio>

      <div class="overlay">
        <p class="line1">
          따뜻한 진공관 불빛이 방 안을 채우던 밤,<br />
          세상의 소음은 멀어지고, 오직 바늘이 스치는 소리만이 마음을 흔들던 시절.
        </p>

        <p class="line2">
          진공관이 천천히 온기를 올리던 순간,,<br />
          세상에서 가장 맑은 첫 음을 듣기 위해 숨까지 고르던 시절이 있었지.
        </p>

        <p class="line3">
          오늘 다시 턴테이블 위에 올려놓는 듯한 이 멜로디,<br />
          그 시절의 나를 조용히 불러낸다.
        </p>
      </div>
    </div>

    <script>
      const audio = document.getElementById('bgm');

      const line1 = document.querySelector('.line1');

      const line2 = document.querySelector('.line2');

      const line3 = document.querySelector('.line3');

      // 타이밍 기준 (총 175초)

      const timing = {
        line1_in: 15, // 15초

        line2_in: 30, // 45초 30

        line3_in: 45, // 95초 45

        line3_out: 60, // 160초 60
      };

      // 오디오 재생 시간에 따라 텍스트 상태 변경

      audio.addEventListener('timeupdate', () => {
        const t = audio.currentTime;

        if (t >= timing.line1_in && t < timing.line2_in) {
          line1.classList.add('show');
        }

        if (t >= timing.line2_in && t < timing.line3_in) {
          line2.classList.add('show');
        }

        if (t >= timing.line3_in && t < timing.line3_out) {
          line3.classList.add('show');
        }
      });
    </script>
  </body>
</html>
