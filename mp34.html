<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le coeur apaisé</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
      font-family: 'Nanum Brush Script', cursive;
    }

    .video-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay-text {
      position: absolute;
      right: 40px;
      bottom: 60px;
      z-index: 9;
      text-align: right;
      line-height: 0.9;
      animation: fadeIn 2.2s ease-out forwards;
    }

    .overlay-text p {
      margin: 0;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }

    .text-large { font-size: 2.5em; }
    .text-medium { font-size: 1.5em; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .audio-fixed-container {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 10000;
      
    }
  </style>
</head>
<body>
  <!-- 텍스트 오버레이 -->
  <div class="overlay-text">
    <p class="text-large">Le coeur apaise</p>
    <p class="text-medium">Jean-marc Staehle</p>
    <br />
    <p class="text-medium">마에스트라</p>
  </div>

  <!-- 비디오 -->
  <div class="video-wrapper">
    <video id="video" muted playsinline loop></video>
  </div>

  <!-- 배경음악 -->
  <div class="audio-fixed-container">
    <audio id="bgm" style="
          border: 2.5px solid #5ac3d177;
          border-radius: 25px;
          width: 250px;
          height: 30px;
        "controls src="https://64.media.tumblr.com/008781250e90adb010f45d3764db4d82/ce6a85403b1b6a2d-91/1e53ed486c6eb169cdba5ee7f500fdd44d579916.mp3"></audio>
  </div>

  <script>
    const video = document.getElementById('video');
    const audio = document.getElementById('bgm');
    const videoSrc = 'https://va.media.tumblr.com/tumblr_tfnnv23eyM1b09833.mp4';

    function initVideo() {
      video.src = videoSrc;

      video.onloadedmetadata = () => {
        video.play().catch(err => {
          console.warn("Video autoplay failed:", err);
        });
      };

      video.onerror = () => {
        console.error("영상 로드 실패");
      };
    }

    // 페이지 로드
    window.addEventListener('load', () => {
      initVideo();

      // 오디오 자동 재생 시도
      audio.play().catch(() => {
        console.log("Audio autoplay blocked. Click to play.");
        
        // 클릭 시 오디오 재생 (한 번만)
        document.body.addEventListener('click', () => {
          audio.play().catch(() => {});
        }, { once: true });
      });
    });
  </script>
</body>
</html>
