<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Card</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  /* 전체를 세로로 쌓는 컨테이너: gif -> 텍스트 -> 오디오 순서로 분리 배치 */
  .container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4vmin;
    padding: 4vmin;
  }

  /* gif는 원본 사이즈(320x276) 그대로 표시 */
  .background {
    width: 320px;
    height: 276px;
  }

  .text {
    color: #fff;
    font-size: 3vmin;
    line-height: 1.6;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    white-space: pre-line; /* 줄바꿈(\n)을 그대로 표시 */
  }

  /* 오디오 플레이어 */
  .audio-wrap {
    z-index: 2;
  }

  audio {
    width: 70vmin;
    max-width: 320px;
  }

  /* 재생 버튼 (자동재생 우회용) */
  .play-btn {
    position: fixed;
    top: 4vmin;
    right: 4vmin;
    z-index: 4;
    background: rgba(255,255,255,0.15);
    color: #dd0a0a;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 1vmin 2.5vmin;
    font-size: 2vmin;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }

  .play-btn:hover {
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

  <div class="container">

    <!-- GIF: src 부분에 원하는 gif URL을 넣으세요 (320x276 원본 사이즈) -->
    <img class="background" src="https://64.media.tumblr.com/d21c6b890ab3987d79320644acada53f/34030ee375127bad-f5/s400x600/29bf506453afa145b8d905c1818b40119ba5d9cb.gifv" alt="background">

    <!-- 텍스트 -->
    <div class="text">여기에 원하는 문구를 적어주세요.
줄바꿈은 이렇게 자유롭게
넣을 수 있어요.</div>

    <!-- 오디오 플레이어 -->
    <div class="audio-wrap">
      <audio id="bgm" src="https://usanonki.github.io/music/stopwind.mp3" autoplay loop></audio>
    </div>

  </div>

  <!-- 자동재생은 브라우저 정책상 막힐 수 있어서, 클릭으로 재생하는 버튼을 추가했어요 -->
  <button class="play-btn" onclick="playAudio()">▶ 재생</button>

  <script>
    function playAudio() {
      const audio = document.getElementById('bgm');
      audio.play();
    }
  </script>

</body>
</html>
