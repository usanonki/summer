<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>June Greetings</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        /* 플렉스 박스로 화면 정중앙 정렬 */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 🌟 핵심 해결사: 원본 이미지의 감성적 비율(약 16:9)을 가진 고정 박스 생성 */
      .card-stage {
        position: relative;
        /* 극단적으로 좁은 iframe 안에서도 꽉 차되 비율이 깨지지 않게 유연하게 설정 */
        width: 100vw;
        height: 58vw; /* 16:9 비율 유지 */
        max-width: 100%;
        max-height: 100%;
        
        /* 배경 지정 */
        background: url('https://contents.usadisk.com/VqJdsnuhiVWAGy1EhoYFaIdUwx8=/a0fbfc8ab1aa4baf8298fd7290607011/clubs_clubusa_126843439834086') no-repeat center center;
        background-size: cover;
      }

      /* ✨ mp4 효과 레이어 - 스테이지 내부에 종속 */
      .effect-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .effect-layer video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.75;
        mix-blend-mode: screen;
        filter: brightness(1.3);
      }

      /* ✨ 타이틀 제목 - 무조건 스테이지 가로폭(cqi 또는 cwv 대용인 vmin)에 비례 */
      h1 {
        position: absolute;
        top: 6%;
        left: 85%;
        transform: translateX(-50%);
        font-family: 'Nanum Brush Script', cursive;
        font-size: 8vmin; /* 부모 크기에 맞춰 완벽하게 비례 축소 */
        font-weight: 700;
        margin: 0;

        background: linear-gradient(90deg, #e1ee70, #ffe6ff, #b3e5ff, #ffd6f5);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        color: transparent;

        animation:
          fadeIn 2.2s ease-out forwards,
          shine 6s ease-in-out infinite,
          glow 4s ease-in-out infinite;

        pointer-events: none;
        white-space: nowrap;
        z-index: 10;
      }

      /* ✍️ 6월 인사말 본문 - 부모 창 높이/너비 중 작은 쪽(vmin)에 완벽 동기화 */
      .greeting-container {
        position: absolute;
        top: 25%;             
        left: 5%;             
        font-family: 'Nanum Brush Script', cursive;
        font-size: 5.5vmin;    /* 🌟 어떤 좁은 iframe에 갇혀도 글자가 절대 깨지거나 튀어나가지 않음 */
        line-height: 1.4;     
        color: #4a3b32;       
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8); 
        z-index: 11;
        animation: fadeIn 3s ease-out forwards; 
      }

      .greeting-p {
        margin-bottom: 3vmin;  
      }

      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(5px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes shine {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes glow {
        0% { text-shadow: 0 0 10px rgba(255, 200, 255, 0.4); }
        50% { text-shadow: 0 0 25px rgba(255, 150, 255, 0.8); }
        100% { text-shadow: 0 0 10px rgba(255, 200, 255, 0.4); }
      }

      /* 🎵 오디오 플레이어 - 작은 무대 우하단에 배치 */
      .audio-fixed {
        position: absolute;
        left: 3%;
        bottom: 5%;
        z-index: 9999;
      }

      .audio-fixed audio {
        border: 2px solid #d1cbd1;
        border-radius: 25px;
        width: 180px; /* 아주 작은 창에서도 삐져나가지 않게 폭 축소 */
        height: 20px;
      }
    </style>
  </head>

  <body>

    <!-- 🌟 사이트가 강제 지정한 iframe 주머니 속에 꽉 들어맞는 가상 캔버스 -->
    <div class="card-stage">
      
      <!-- ✨ 타이틀 제목 -->
      <h1>해피 데이</h1>

      <!-- ✍️ 6월 인사말 본문 -->
      <div class="greeting-container">
        <div class="greeting-p">
          눈부신 햇살과 푸른 하늘이 반겨주는<br>
          6월을 맞아 해피데이 회원님들께 반가운 인사를 건냅니다.
        </div>
        <div class="greeting-p">
          계절의 변화가 주는 설렘을 혼자 즐기기보다,<br>
          회원 여러분과 함께 나누면 기쁨이 배가 될 거 같아요.
        </div>
        <div class="greeting-p">
          소소한 행복과 아름다운 선율을 나누는<br>
          행복한 6월이 되었으면 좋겠습니다.<br><br>
          마에스트라
        </div>
      </div>

      <!-- ✨ mp4 효과 레이어 -->
      <div class="effect-layer">
        <video src="" autoplay loop muted></video>
        <video src="https://usanonki.github.io/photo/sky2.mp4" autoplay loop muted></video>
      </div>

      <!-- 🎵 오디오 -->
      <div class="audio-fixed">
        <audio id="mainAudio" src="https://blog.kakaocdn.net/dn/HIlj1/btrzuzgtAa7/m1mKkmh6Az1RuR9deHqLf0/tfile.mp3" controls autoplay loop></audio>
      </div>

    </div>

    <script>
      const audio = document.getElementById('mainAudio');
      audio.volume = 0.2;

      document.body.addEventListener('click', () => audio.play(), {
        once: true,
      });
    </script>
  </body>
</html>
